services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-cpp
    restart: unless-stopped
    ports:
      - "9002:8080"
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/phi-3-mini-q4.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 2048
      --threads 4
      --n-predict 128
      --no-mmap
      -to 300
      --sleep-idle-seconds 180
