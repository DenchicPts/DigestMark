services:
  whisper:
    build: .
    container_name: whisper
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./whisper-models:/root/.cache/huggingface   # WhisperX кэширует модели сюда
    environment:
      - MODEL_SIZE=medium        # tiny | base | small | medium | large-v3-turbo
      - DEVICE=cpu
      - CPU_THREADS=0            # 0 = авто
      - BATCH_SIZE=1             # на CPU > 1 не даёт выигрыша
      - LANGUAGE=                # пусто = авто-определение
      - IDLE_TIMEOUT=300         # секунд простоя до выгрузки модели
      - MALLOC_ARENA_MAX=2
      - MALLOC_MMAP_THRESHOLD_=131072
    mem_limit: 4g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
